# Common publication parameters for IRAM-Omega-Q
dim=16
focusIndex=6
dt=0.01
salienceCenter=6.0
salienceWidth=2.0
phaseNoise=0.2
energyScale=0.15
coupling=0.08
locality=2.0
muDerivativeGain=5e-4
muTargetGain=2e-4
muMin=0.001
muMax=1.0
seed=123456789
baseSeed=123456789
threads=4
fast=false

# Paper 2: continuous carryover hysteresis loop (DISTURBANCE_FIRST)
# The same trajectory ramps target entropy up and back down; no reset at turn.
mode=HYSTERESIS
ordering=DISTURBANCE_FIRST
experimentTag=paper2_df_hysteresis
mu=0.08
noise=0.13
targetEntropy=0.30
steps=30000
targetEntropyStart=0.15
targetEntropyEnd=0.45
targetEntropySchedule=TRIANGULAR
sweepUp=true
sweepDown=true
outDir=analysis/results/paper2
runName=df_hysteresis
