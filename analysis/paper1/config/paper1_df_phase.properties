# Common publication parameters for IRAM-Omega-Q
dim=16
focusIndex=6
dt=0.01
salienceCenter=6.0
salienceWidth=2.0
phaseNoise=0.2
energyScale=0.15
coupling=0.08
locality=2.0
muDerivativeGain=5e-4
muTargetGain=2e-4
muMin=0.001
muMax=1.0
seed=123456789
baseSeed=123456789
threads=4
fast=false

# Paper 1: publication phase diagram and susceptibility (DISTURBANCE_FIRST)
